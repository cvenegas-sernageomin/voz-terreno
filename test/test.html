<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Voz Terreno – Tests</title>
  <style>
    body { font-family: monospace; padding: 1.2em; background: #1a1a1a; color: #d4d4d4; }
    h2 { color: #9cdcfe; margin-bottom: 0.5em; }
    pre { margin: 0; line-height: 1.7; }
    .pass { color: #4ec9b0; }
    .fail { color: #f44747; font-weight: bold; }
    .skip { color: #808080; }
    .section { color: #569cd6; margin-top: 0.4em; }
    .summary-ok { color: #4ec9b0; font-weight: bold; font-size: 1.1em; }
    .summary-fail { color: #f44747; font-weight: bold; font-size: 1.1em; }
  </style>
</head>
<body>
  <h2>Voz Terreno – Test Suite</h2>
  <pre id="output">Cargando...</pre>

  <script src="../src/vocabulario.js"></script>
  <script src="../src/extractor.js"></script>
  <script>
    const out = document.getElementById('output');
    out.textContent = '';
    let passed = 0, failed = 0;

    function assert(label, condition) {
      if (condition) {
        out.innerHTML += '<span class="pass">PASS</span> ' + label + '\n';
        passed++;
      } else {
        out.innerHTML += '<span class="fail">FAIL</span> ' + label + '\n';
        failed++;
      }
    }

    function section(title) {
      out.innerHTML += '\n<span class="section">--- ' + title + ' ---</span>\n';
    }

    // =========================================================
    // VOCABULARIO TESTS
    // =========================================================
    section('vocabulario.js');

    try {
      // 1. VOZ_MODULOS es objeto con 8 keys
      assert(
        'VOZ_MODULOS es un objeto con 8 keys',
        typeof VOZ_MODULOS === 'object' && VOZ_MODULOS !== null &&
        Object.keys(VOZ_MODULOS).length === 8
      );

      // 2. igneas tiene más de 25 elementos
      assert(
        'VOZ_MODULOS.igneas es array con > 25 elementos',
        Array.isArray(VOZ_MODULOS.igneas) && VOZ_MODULOS.igneas.length > 25
      );

      // 3. Instanciación
      const vocab = new VocabularioLocal('test');
      assert(
        'new VocabularioLocal("test") crea instancia',
        vocab instanceof VocabularioLocal
      );

      // 4. activar no lanza error
      vocab.activar(['igneas', 'varnes']);
      assert('.activar(["igneas","varnes"]) ejecuta sin error', true);

      // 5. getTerminos retorna array con length > 0
      const terminos = vocab.getTerminos();
      assert(
        '.getTerminos() retorna array con length > 0',
        Array.isArray(terminos) && terminos.length > 0
      );

      // 6. getTerminos incluye {original: "granito"}
      assert(
        'getTerminos() incluye entrada con original === "granito"',
        terminos.some(t => t.original === 'granito')
      );

      // 7. getTerminos incluye {original: "flujo de detritos"}
      assert(
        'getTerminos() incluye entrada con original === "flujo de detritos"',
        terminos.some(t => t.original === 'flujo de detritos')
      );

      // Limpiar localStorage antes de guardar (estado limpio)
      localStorage.removeItem('voz-vocab-test');

      // 8. guardar
      vocab.guardar('tobita', 'litologia', 'Toba vitrica');
      assert('.guardar("tobita","litologia","Toba vitrica") ejecuta sin error', true);

      // 9. buscar("tobita")
      const r1 = vocab.buscar('tobita');
      assert(
        '.buscar("tobita") retorna {campoId:"litologia", valor:"Toba vitrica"}',
        r1 !== null &&
        r1.campoId === 'litologia' &&
        r1.valor === 'Toba vitrica'
      );

      // 10. buscar("tóbita") con tilde — normalización
      const r2 = vocab.buscar('tóbita');
      assert(
        '.buscar("tóbita") retorna mismo resultado (normalización de tildes)',
        r2 !== null &&
        r2.campoId === 'litologia' &&
        r2.valor === 'Toba vitrica'
      );

      // 11. listar() retorna objeto con key "tobita"
      const lista = vocab.listar();
      assert(
        '.listar() retorna objeto con key "tobita"',
        lista !== null &&
        typeof lista === 'object' &&
        'tobita' in lista
      );

    } catch (e) {
      out.innerHTML += '<span class="fail">ERROR inesperado en vocabulario tests: ' +
        e.message + '</span>\n';
      failed++;
    }

    // =========================================================
    // EXTRACTOR TESTS
    // =========================================================
    section('extractor.js');

    try {
      const v2 = new VocabularioLocal("test-ext");
      v2.activar(["igneas", "varnes", "isrm"]);

      const a1 = Extractor.extraerAngulo("manteo 35 grados", [0, 90]);
      assert("extraerAngulo '35 grados'", a1 && a1.valor === 35);

      const a2 = Extractor.extraerAngulo("dip 72°", [0, 90]);
      assert("extraerAngulo '72°'", a2 && a2.valor === 72);

      const a3 = Extractor.extraerAngulo("treinta grados", [0, 90]);
      assert("extraerAngulo palabra 'treinta'", a3 && a3.valor === 30);

      const a4 = Extractor.extraerAngulo("manteo 95°", [0, 90]);
      assert("extraerAngulo fuera de rango = null", a4 === null);

      const n1 = Extractor.extraerNumero("largo 200 metros", [0, 50000]);
      assert("extraerNumero '200 metros'", n1 && n1.valor === 200);

      const n2 = Extractor.extraerNumero("H/L 0,15", [0, 1]);
      assert("extraerNumero decimal con coma '0,15'", n2 && n2.valor === 0.15);

      const isrm1 = Extractor.extraerISRM("roca moderadamente meteorizada");
      assert("extraerISRM 'moderadamente meteorizada' → W3", isrm1 && isrm1.valor.startsWith("W3"));

      const isrm2 = Extractor.extraerISRM("W1 fresca sin alteracion");
      assert("extraerISRM 'W1 fresca' → W1", isrm2 && isrm2.valor.startsWith("W1"));

      const campoClasif = { id: "tipo-movimiento", tipo: "clasificacion",
        valores: ["Caída de roca", "Flujo de detritos (debris flow)", "Deslizamiento traslacional en roca"] };
      const c1 = Extractor.extraerCampo("flujo de detritos", campoClasif, v2);
      assert("extraerCampo clasificacion 'flujo de detritos'", c1 && c1.valor === "Flujo de detritos (debris flow)");

      const campoLito = { id: "litologia", tipo: "litologia" };
      const c2 = Extractor.extraerCampo("basalto andesitico", campoLito, v2);
      assert("extraerCampo litologia 'basalto andesitico'", c2 && c2.confianza > 0);

      const campoLibre = { id: "otros", tipo: "texto_libre" };
      const c3 = Extractor.extraerCampo("  zona activa con fracturas   ", campoLibre, v2);
      assert("extraerCampo texto_libre trim", c3 && c3.valor === "zona activa con fracturas");

      const campos = [
        { id: "tipo-movimiento", label: "Tipo", tipo: "clasificacion",
          valores: ["Flujo de detritos (debris flow)", "Deslizamiento traslacional en roca"] },
        { id: "orientacion", label: "Orientación", tipo: "angulo", rango: [0, 360] },
        { id: "otros", label: "Observaciones", tipo: "texto_libre" },
      ];
      const multi = Extractor.extraerMultiple(
        "flujo de detritos orientacion 220 grados zona activa", campos, v2);
      assert("extraerMultiple detecta >=2 campos", multi.length >= 2);
      assert("extraerMultiple incluye tipo-movimiento", multi.some(r => r.campoId === "tipo-movimiento"));
      assert("extraerMultiple excluye texto_libre", multi.every(r => r.campoId !== "otros"));

    } catch (e) {
      out.innerHTML += '<span class="fail">ERROR inesperado en extractor tests: ' +
        e.message + '</span>\n';
      failed++;
    }

    // =========================================================
    // RESUMEN
    // =========================================================
    const total = passed + failed;
    out.innerHTML += '\n';
    if (failed === 0) {
      out.innerHTML += '<span class="summary-ok">RESULTADO: ' + passed + '/' + total + ' PASSED</span>\n';
    } else {
      out.innerHTML += '<span class="summary-fail">RESULTADO: ' + failed + ' FAILED, ' + passed + ' passed (' + total + ' total)</span>\n';
    }
  </script>
</body>
</html>
